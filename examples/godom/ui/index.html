<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Erasmus godom chat</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div>
        <h1 g-text="Title">Erasmus godom chat</h1>
        <p><span g-text="Provider"></span>/<span g-text="ModelID"></span> · reasoning <span g-text="Reasoning"></span> · session <span g-text="SessionID"></span></p>
      </div>
      <div class="status-line">
        <span class="status-pill" g-text="Status">ready</span>
        <span g-show="Running" class="running">running</span>
      </div>
    </header>

    <section class="workspace">
      <section class="chat-pane" aria-label="Chat">
        <div class="history">
          <article class="message" g-for="msg in ChatMessages">
            <div class="message-meta">
              <strong g-text="msg.Label"></strong>
              <time g-text="msg.When"></time>
            </div>
            <p g-text="msg.Text"></p>
          </article>
        </div>

        <form class="composer">
          <textarea rows="4" g-bind="ChatInput" placeholder="Send a message to the Erasmus demo assistant"></textarea>
          <div class="composer-actions">
            <p class="error" g-show="Error" g-text="Error"></p>
            <button class="primary" type="button" g-click="SendChat">Send</button>
          </div>
        </form>
      </section>

      <aside class="side-pane">
        <section class="panel">
          <h2>Session</h2>
          <dl>
            <div><dt>cwd</dt><dd g-text="CWD"></dd></div>
            <div><dt>input</dt><dd g-text="InputTokens"></dd></div>
            <div><dt>output</dt><dd g-text="OutputTokens"></dd></div>
          </dl>
          <div class="actions">
            <button type="button" g-click="ContinueRun">Continue</button>
            <button type="button" g-click="AbortRun">Abort</button>
            <button type="button" g-click="CompactSession">Compact</button>
          </div>
        </section>

        <section class="panel">
          <div class="panel-title">
            <h2>Events</h2>
            <button type="button" g-click="ClearEvents">Clear</button>
          </div>
          <ul class="events">
            <li g-for="ev in Events">
              <time g-text="ev.When"></time>
              <strong g-text="ev.Kind"></strong>
              <span g-text="ev.Text"></span>
            </li>
          </ul>
        </section>
      </aside>
    </section>
  </main>
</body>
</html>
