name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      snapshot:
        description: Build a snapshot release without publishing
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # Gate the publish on the same checks CI runs on main/PRs. A v* tag can be
      # pushed by any path (e.g. a manual git tag, not just `make bump`), so the
      # release job must re-verify formatting, vet, lint and smoke itself rather
      # than trust that CI already passed for this commit. (golangci-lint is
      # pinned to the same version as ci.yml so the two cannot disagree.)
      # Follow-up to DRY this against ci.yml: see the tracked issue for option B.
      - name: gofmt check
        run: |
          files="$(gofmt -l .)"
          if [ -n "$files" ]; then
            echo "$files"
            exit 1
          fi

      - name: Vet
        run: make vet

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          args: ./...

      - name: Run tests
        run: make test

      - name: Smoke tests
        run: make smoke

      - name: GoReleaser snapshot
        if: github.event_name == 'workflow_dispatch' && inputs.snapshot
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser-pro
          version: latest
          args: release --snapshot --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}

      - name: GoReleaser release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser-pro
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}
